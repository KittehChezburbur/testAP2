name: Build QMOD
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clean
        run: rm -f qpm.shared.json
      - name: Install tools
        run: sudo apt-get install -y ninja-build
      - uses: fernthedev/qpm-action@v1
        with:
          workflow_token: ${{ secrets.GITHUB_TOKEN }}
          restore: true
          cache: true
      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
      - name: Move files
        run: mkdir -p src include && mv main.cpp mod.cpp src/ ; mv main.hpp mod.hpp include/
      - name: Build
        run: |
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -B build -S .
          cmake --build build
      - name: Make qmod
        run: |
          cp mod.template.json mod.json
          find build -name "*.so" -not -name "*.debug.so" -exec cp {} libautoplay.so \;
          zip -j autoplay.qmod mod.json libautoplay.so
      - uses: actions/upload-artifact@v4
        with:
          name: autoplay-qmod
          path: autoplay.qmod
